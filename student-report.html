<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Attendance Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="dashboard-header panel-card">
      <div class="dashboard-header__content">
        <div>
          <h1 class="dashboard-title">Student Attendance Report</h1>
          <p class="dashboard-subtitle">View attendance totals and record dates for each student.</p>
        </div>
        <div class="toolbar-actions">
          <button id="backToMain" class="btn btn-outline">Back to Attendance</button>
        </div>
      </div>
    </header>

    <section class="panel-card">
      <div class="search-filter-bar">
        <div class="search-box">
          <input id="reportSearch" class="field-input search-input" placeholder="Search student by name or ID" />
        </div>
      </div>

      <div class="table-container">
        <table id="studentReportTable" class="attendance-table" aria-label="Student attendance report table">
          <thead>
            <tr>
              <th>No.</th>
              <th>Student ID</th>
              <th>Student Name</th>
              <th>Present</th>
              <th>Absent</th>
              <th>Permission</th>
              <th>Recorded Dates</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script type="module" src="student-report.js"></script>
</body>
</html>
